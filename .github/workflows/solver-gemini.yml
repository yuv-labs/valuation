name: solver-gemini

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to solve"
        required: true
      max_iterations:
        description: "Max agent iterations"
        required: false
        default: "20"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: solver-gemini-${{ github.event.inputs.issue_number }}
  cancel-in-progress: true

jobs:
  solve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup agent environment
        run: pip install -U google-genai

      - name: Write GCP service account key
        shell: bash
        run: |
          mkdir -p .secrets
          echo '${{ secrets.GCP_SA_KEY_JSON }}' > .secrets/sa.json
          chmod 600 .secrets/sa.json

      - name: Checkout or create solver branch
        shell: bash
        run: |
          set -euo pipefail
          BR="gemini-issue-${{ github.event.inputs.issue_number }}"
          BASE="${{ github.ref_name }}"

          if git ls-remote --exit-code --heads origin "$BR" >/dev/null 2>&1; then
            git fetch origin "$BR"
            git checkout -B "$BR" "origin/$BR"
          else
            git checkout -B "$BR" "$BASE"
          fi

      - name: Fetch issue context
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ISSUE="${{ github.event.inputs.issue_number }}"
          mkdir -p .solver
          gh api "repos/${{ github.repository }}/issues/$ISSUE" > .solver/issue.json
          gh api "repos/${{ github.repository }}/issues/$ISSUE/comments" \
            > .solver/issue_comments.json

      - name: Run Gemini agent
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.secrets/sa.json
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GCP_LOCATION }}
        shell: bash
        run: |
          set -euo pipefail
          python .github/workflows/solver_gemini.py \
            --issue-json .solver/issue.json \
            --issue-comments-json .solver/issue_comments.json \
            --max-iterations ${{ github.event.inputs.max_iterations }}

      - name: Commit & push
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .solver .secrets

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "gemini-solver-bot"
          git config user.email "gemini-solver-bot@users.noreply.github.com"

          git add --all
          git reset HEAD -- .solver/ .secrets/ .codex/ 2>/dev/null || true

          if [[ -z "$(git diff --cached --name-only)" ]]; then
            echo "No staged changes after filtering."
            exit 0
          fi

          git commit -m "gemini-solver: issue #${{ github.event.inputs.issue_number }}"
          git push -u origin "gemini-issue-${{ github.event.inputs.issue_number }}"

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ISSUE="${{ github.event.inputs.issue_number }}"
          BR="gemini-issue-$ISSUE"
          DEFAULT="${{ github.event.repository.default_branch }}"

          PR_NUM="$(gh pr list --head "$BR" --state open --json number \
            -q '.[0].number' || true)"
          if [[ -z "$PR_NUM" || "$PR_NUM" == "null" ]]; then
            gh pr create \
              --head "$BR" \
              --base "$DEFAULT" \
              --title "gemini-solver: issue #$ISSUE" \
              --body "Automated fix for #$ISSUE by Gemini solver."
          else
            gh pr comment "$PR_NUM" \
              --body "Updated by Gemini solver (pushed new commits)."
          fi

      - name: On failure, comment on issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ISSUE="${{ github.event.inputs.issue_number }}"
          LOGS="${{ github.server_url }}/${{ github.repository }}"
          LOGS="$LOGS/actions/runs/${{ github.run_id }}"
          gh issue comment "$ISSUE" --body "Gemini solver failed. Logs: $LOGS"
