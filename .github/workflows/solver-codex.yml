name: solver-codex

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to solve"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: solver-codex-${{ github.event.inputs.issue_number }}
  cancel-in-progress: true

jobs:
  solve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm i -g @openai/codex

      - name: Configure Codex auth
        shell: bash
        run: |
          export CODEX_HOME="${{ github.workspace }}/.codex"
          mkdir -p "$CODEX_HOME"
          echo '${{ secrets.CODEX_AUTH_JSON }}' > "$CODEX_HOME/auth.json"
          chmod 600 "$CODEX_HOME/auth.json"
          echo "CODEX_HOME=$CODEX_HOME" >> $GITHUB_ENV

      - name: Checkout or create solver branch
        shell: bash
        run: |
          set -euo pipefail
          BR="codex-issue-${{ github.event.inputs.issue_number }}"
          BASE="${{ github.ref_name }}"

          if git ls-remote --exit-code --heads origin "$BR" >/dev/null 2>&1; then
            git fetch origin "$BR"
            git checkout -B "$BR" "origin/$BR"
          else
            git checkout -B "$BR" "$BASE"
          fi

      - name: Fetch issue context
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ISSUE="${{ github.event.inputs.issue_number }}"
          mkdir -p .solver
          gh api "repos/${{ github.repository }}/issues/$ISSUE" > .solver/issue.json
          gh api "repos/${{ github.repository }}/issues/$ISSUE/comments" \
            > .solver/issue_comments.json

      - name: Run Codex agent
        shell: bash
        run: |
          set -euo pipefail
          ISSUE="${{ github.event.inputs.issue_number }}"

          TITLE=$(jq -r '.title' .solver/issue.json)
          BODY=$(jq -r '.body // ""' .solver/issue.json)

          read -r -d '' PROMPT << 'EOFPROMPT' || true
          You are solving a GitHub issue.

          IMPORTANT: First understand and set up the development environment:
          1. Read README.md to understand the project setup instructions
          2. Check pyproject.toml or requirements.txt for dependencies
          3. Follow the project documented setup process (create venv, install deps)

          Then solve the issue:
          1. Explore the codebase to understand the project structure
          2. Implement the fix or feature requested
          3. Write or update unit tests as needed
          4. Run tests following the project test setup
          5. If tests fail, fix and re-run
          6. Do NOT commit - just make the code changes

          EOFPROMPT

          FULL_PROMPT="$PROMPT

          ISSUE #$ISSUE
          TITLE: $TITLE

          BODY:
          $BODY"

          codex exec --full-auto "$FULL_PROMPT"

      - name: Commit & push
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .solver .codex .secrets

          echo "=== Git status ==="
          git status --porcelain

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "codex-solver-bot"
          git config user.email "codex-solver-bot@users.noreply.github.com"

          git add --all
          git reset HEAD -- .solver/ .secrets/ .codex/ 2>/dev/null || true

          echo "=== Staged files ==="
          git diff --cached --name-only

          if [[ -z "$(git diff --cached --name-only)" ]]; then
            echo "No staged changes after filtering."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "codex-solver: issue #${{ github.event.inputs.issue_number }}"
          git push -u origin "codex-issue-${{ github.event.inputs.issue_number }}"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ISSUE="${{ github.event.inputs.issue_number }}"
          BR="codex-issue-$ISSUE"
          DEFAULT="${{ github.event.repository.default_branch }}"

          PR_NUM="$(gh pr list --head "$BR" --state open --json number \
            -q '.[0].number' || true)"
          if [[ -z "$PR_NUM" || "$PR_NUM" == "null" ]]; then
            gh pr create \
              --head "$BR" \
              --base "$DEFAULT" \
              --title "codex-solver: issue #$ISSUE" \
              --body "Automated fix for #$ISSUE by Codex agent."
          else
            gh pr comment "$PR_NUM" \
              --body "Updated by Codex solver (pushed new commits)."
          fi

      - name: On failure, comment on issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ISSUE="${{ github.event.inputs.issue_number }}"
          LOGS="${{ github.server_url }}/${{ github.repository }}"
          LOGS="$LOGS/actions/runs/${{ github.run_id }}"
          gh issue comment "$ISSUE" --body "Codex solver failed. Logs: $LOGS"
